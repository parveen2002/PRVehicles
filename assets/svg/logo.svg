<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="carBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background Circle -->
  <circle cx="55" cy="55" r="50" fill="url(#logoBg)" stroke="url(#goldGrad)" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="55" cy="55" r="42" fill="none" stroke="url(#blueGrad)" stroke-width="1" opacity="0.5"/>
  <!-- PR Text -->
  <text x="55" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="900" text-anchor="middle" fill="url(#goldGrad)" filter="url(#glow)">PR</text>
  <!-- Vehicle Silhouette (Car shape integrated below PR) -->
  <g transform="translate(28, 72)" opacity="0.9">
    <path d="M0 18 C0 12, 4 10, 8 10 L10 6 C12 0, 18 0, 22 0 L32 0 C36 0, 40 2, 42 6 L44 10 C48 10, 54 12, 54 18 L54 22 L0 22 Z" fill="url(#carBody)"/>
    <rect x="12" y="3" width="8" height="6" rx="1" fill="#0F172A" opacity="0.8"/>
    <rect x="25" y="3" width="10" height="6" rx="1" fill="#0F172A" opacity="0.8"/>
    <circle cx="12" cy="20" r="4" fill="#1E293B"/>
    <circle cx="12" cy="20" r="2" fill="#64748B"/>
    <circle cx="42" cy="20" r="4" fill="#1E293B"/>
    <circle cx="42" cy="20" r="2" fill="#64748B"/>
  </g>
  <!-- Company Name -->
  <text x="120" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="800" fill="#F1F5F9" letter-spacing="1">PR Vehicle</text>
  <text x="120" y="78" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="url(#goldGrad)" letter-spacing="3">RENTALS</text>
  <!-- Tagline -->
  <text x="120" y="98" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748B" letter-spacing="2">LUDHIANA · PUNJAB · INDIA</text>
</svg>
